name: Deal Validity Check

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate-deals:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate deal pricing and reachability
        run: |
          python scripts/validate_discount_freshness.py \
            --fail-on-stale \
            --fail-on-unreachable \
            --json-out review-queue/deal-validity-report.json

      - name: Upload validity report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: deal-validity-report
          path: review-queue/deal-validity-report.json
          if-no-files-found: ignore
