name: Deploy Hugo site

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      AMZ_PAAPI_ACCESS_KEY: ${{ secrets.AMZ_PAAPI_ACCESS_KEY }}
      AMZ_PAAPI_SECRET_KEY: ${{ secrets.AMZ_PAAPI_SECRET_KEY }}
      AMZ_PARTNER_TAG: ${{ secrets.AMZ_PARTNER_TAG }}
      AMZ_MARKETPLACE: ${{ secrets.AMZ_MARKETPLACE }}
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 0

      - name: Guard against eval-like JavaScript
        run: |
          if rg -n "eval\\(|new Function\\(|setTimeout\\(\\s*['\\\"]|setInterval\\(\\s*['\\\"]" layouts static; then
            echo "Blocked: eval-like JavaScript patterns found. Refactor to safe alternatives."
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install fetch deps
        run: pip install -r scripts/requirements.txt

      - name: Fetch deals (PA-API)
        if: ${{ env.AMZ_PAAPI_ACCESS_KEY != '' && env.AMZ_PAAPI_SECRET_KEY != '' && env.AMZ_PARTNER_TAG != '' && env.AMZ_MARKETPLACE != '' }}
        run: python scripts/fetch_deals.py

      - name: Sync listing details (from URLs)
        run: python scripts/sync_listing_from_urls.py

      - name: Skip PA-API fetch (keys missing)
        if: ${{ env.AMZ_PAAPI_ACCESS_KEY == '' || env.AMZ_PAAPI_SECRET_KEY == '' || env.AMZ_PARTNER_TAG == '' || env.AMZ_MARKETPLACE == '' }}
        run: echo "AMZ_* secrets missing. Skipping PA-API refresh; URL metadata sync still runs."

      - name: Enforce sync metadata for newly added deals
        if: ${{ github.event_name == 'push' }}
        run: |
          set -euo pipefail
          BEFORE="${{ github.event.before }}"
          AFTER="${{ github.sha }}"

          if [ -z "$BEFORE" ] || [ "$BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "No valid base SHA found for this push; skipping new-deal sync guard."
            exit 0
          fi

          mapfile -t NEW_DEALS < <(git diff --name-status "$BEFORE" "$AFTER" -- 'content/deals/*.md' | awk '$1=="A"{print $2}')

          if [ "${#NEW_DEALS[@]}" -eq 0 ]; then
            echo "No newly added deal files detected."
            exit 0
          fi

          missing=0
          for file in "${NEW_DEALS[@]}"; do
            if ! grep -Eq '^listing_title[[:space:]]*=[[:space:]]*".+"' "$file"; then
              echo "Missing required synced field listing_title in $file"
              missing=1
            fi
            if ! grep -Eq '^listing_image[[:space:]]*=[[:space:]]*".+"' "$file"; then
              echo "Missing required synced field listing_image in $file"
              missing=1
            fi
            if ! grep -Eq '^listing_url[[:space:]]*=[[:space:]]*".+"' "$file"; then
              echo "Missing required synced field listing_url in $file"
              missing=1
            fi
            if ! grep -Eq '^listing_synced_at[[:space:]]*=[[:space:]]*".+"' "$file"; then
              echo "Missing required synced field listing_synced_at in $file"
              missing=1
            fi
          done

          if [ "$missing" -ne 0 ]; then
            echo "Newly added deal files must be synced (python scripts/sync_listing_from_urls.py) before deploy."
            exit 1
          fi

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'

      - name: Build
        run: hugo --environment production

      - name: SEO audit
        env:
          SEO_AUDIT_STRICT: "0"
        run: |
          chmod +x scripts/seo_audit.sh
          ./scripts/seo_audit.sh public

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
