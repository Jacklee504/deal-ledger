name: Send manual signup alert email

on:
  workflow_dispatch:
    inputs:
      recipient_email:
        description: "Recipient email address"
        required: true
        type: string
      sample_type:
        description: "Email type to send"
        required: true
        type: choice
        options:
          - category
          - keyword
          - weekly_digest
      country:
        description: "Deal country filter"
        required: true
        type: choice
        default: ie
        options:
          - ie
          - us
      days_back:
        description: "Only include deals added in the last N days"
        required: true
        type: choice
        default: "1"
        options:
          - "1"
          - "2"
          - "3"
          - "4"
          - "5"
          - "7"
      query:
        description: "Free-text query (required for category/keyword, e.g. vinyl)"
        required: false
        type: string
      categories:
        description: "Comma-separated categories (used when sample_type=category, e.g. audio, desk, gaming)"
        required: false
        type: string
      dry_run:
        description: "Render only (do not send)"
        required: true
        type: boolean
        default: false

jobs:
  send-manual:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Validate inputs
        run: |
          if [ "${{ inputs.sample_type }}" = "category" ]; then
            if [ -z "${{ inputs.categories }}" ] && [ -z "${{ inputs.query }}" ]; then
              echo "Provide categories (preferred) or query when sample_type=category."
              exit 1
            fi
          elif [ "${{ inputs.sample_type }}" = "keyword" ] && [ -z "${{ inputs.query }}" ]; then
            echo "query is required when sample_type=keyword."
            exit 1
          fi

      - name: Send signup-option email (manual)
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
          SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          SMTP_USE_TLS: "true"
          SITE_BASE_URL: "https://dealledger.eu"
        run: |
          QUERY_INPUT="${{ inputs.query }}"
          if [ "${{ inputs.sample_type }}" = "category" ] && [ -n "${{ inputs.categories }}" ]; then
            QUERY_INPUT="${{ inputs.categories }}"
          fi

          CMD=(python scripts/send_sample_signup_alerts.py \
            --to "${{ inputs.recipient_email }}" \
            --type "${{ inputs.sample_type }}" \
            --country "${{ inputs.country }}" \
            --days-back "${{ inputs.days_back }}")

          if [ -n "$QUERY_INPUT" ]; then
            CMD+=(--query "$QUERY_INPUT")
          fi

          if [ "${{ inputs.dry_run }}" = "true" ]; then
            CMD+=(--dry-run --preview-dir review-queue)
          fi

          "${CMD[@]}"
